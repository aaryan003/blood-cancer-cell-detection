version: "3.8"

services:
  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-80}
      - ML_SERVICE_URL=http://ml-service:8000
      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY:-}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
    volumes:
      - backend-data:/app/prisma
    depends_on:
      - ml-service
    networks:
      - app-network
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "${ML_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ml-service/weights:/app/weights
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
